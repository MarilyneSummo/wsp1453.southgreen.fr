<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>
<body>
    <h1>Test Socket.IO</h1>
    <div id="status">Déconnecté</div>
    <button onclick="socket.emit('clientInfo', {url: window.location.href})">
        Envoyer clientInfo
    </button>
    
    <script>
        const socket = io('https://wsp1453.southgreen.fr:1453', {
            transports: ['websocket'], // Force WebSocket (pas polling)
            rejectUnauthorized: false  // Ignore certificat auto-signé
        });
        
        socket.on('connect', () => {
            document.getElementById('status').innerHTML = 
                'CONNECTÉ ! ID: ' + socket.id;
            console.log('Socket.IO connecté');
        });
        
        socket.on('connect_error', (err) => {
            console.error('Erreur connexion:', err);
            document.getElementById('status').innerHTML = 'Erreur: ' + err.message;
        });
        
        socket.on('disconnect', () => {
            document.getElementById('status').innerHTML = 'Déconnecté';
        });
    </script>
</body>
</html>
